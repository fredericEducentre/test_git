<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YTP Glitch Generator</title>
    <style>
        body {
            background: #000;
            color: #0f0;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        #video-container {
            position: relative;
            border: 5px solid #333;
            transition: all 0.1s ease;
        }

        video {
            width: 640px;
            max-width: 90vw;
            display: block;
        }

        /* YTP Style Distortions */
        .glitch-invert { filter: invert(1) hue-rotate(180deg); }
        .glitch-saturate { filter: saturate(10) contrast(2); }
        .glitch-shake { transform: translate(10px, -10px) rotate(2deg); }
        .glitch-zoom { transform: scale(1.5); }

        .controls {
            margin-top: 20px;
        }

        button {
            background: #ff0000;
            color: white;
            border: none;
            padding: 15px 30px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1.2rem;
            text-transform: uppercase;
            box-shadow: 5px 5px 0px #550000;
        }

        button:active {
            box-shadow: 2px 2px 0px #550000;
            transform: translateY(3px);
        }
    </style>
</head>
<body>
    <section>
        <h2>Testimonial</h2>
        <article>
            <img src="https://img-19.commentcamarche.net/AINHgQU6hzAaA-eacqk4lYu9IhE=/1500x/smart/d8c10e7fd21a485c909a5b4c5d99e611/ccmcms-commentcamarche/20456790.jpg" alt="Testimonial image">
        </article>
    </section>
</body>
</html>
